[pytest]
testpaths = app/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Birim testleri — izole, hizli, DB gerektirmez
    integration: Entegrasyon testleri — servisler arasi akislar
    e2e: Uc-uca (end-to-end) karar pipeline testleri
    regression: Regression / golden dataset testleri
    api: API smoke ve contract testleri
    ui: UI smoke testleri (display gerekebilir)
    db: Veritabani / schema / migration testleri
    benchmark: ML / benchmark metrik testleri
    performance: Performans smoke testleri
    slow: Yavas calisan testler — CI default'unda atlanabilir
    requires_display: Gercek ekran / display gerektiren testler
    requires_xgboost: XGBoost kurulu oldugunda calisan testler

addopts =
    --strict-markers
    -ra
    --tb=short

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

log_cli = false
log_cli_level = WARNING
